<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 5 And GitHub Issues Tracker</title>
    <!-- daisy ui and tailwind link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css link -->
    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <nav>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <i class="fa-brands fa-github text-xl"></i>
          <a class="btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <!-- Search Input -->
        <div class="relative w-64">
          <i
            class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-red-700"
          ></i>
          <input
            type="text"
            placeholder="Search Issue"
            class="input input-bordered w-full pl-10"
          />
        </div>
        <div>
          <button class="btn btn-primary ml-3 text-lg">+ New Issue</button>
        </div>
      </div>
    </nav>
    <section class="w-11/12 m-auto mt-10">
      <!-- name of each tab group should be unique -->
      <div class="shadow p-5">
        <button id="all" class="btn btn-primary py-5 px-10 rounded-lg">
          ALL
        </button>
        <button id="open"  class="btn py-5 px-10 rounded-lg">Open</button>
        <button id="close" class="btn py-5 px-10 rounded-lg">Close</button>
      </div>
    </section>
    <section class="w-11/12 m-auto mt-10 shadow p-3">
      <div class="flex justify-between">
        <div class="flex w-[50%]">
          <img src="assets/Aperture.png" alt="" />
          <div class="ml-3">
            <p id="all-issues" class="font-semibold">50 Issues</p>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex space-x-2">
          <div class="flex items-center">
            <div
              class="w-3 h-3 rounded-full bg-green-500 flex justify-center i"
            ></div>
            <span class="ml-1">Open</span>
          </div>
          <div class="flex items-center">
            <div
              class="w-3 h-3 rounded-full bg-indigo-600 flex justify-center i"
            ></div>
            <span class="ml-1">Closed</span>
          </div>
        </div>
      </div>
    </section>
    <div
      id="card-container"
      class="w-11/12 m-auto mt-10 grid grid-cols-4 gap-5"
    >
     
    </div>
    <script src="script/home.js"></script>
  </body>
</html>
